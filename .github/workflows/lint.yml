name: lint

on:
  push:
  pull_request:

jobs:
  pint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction
      - name: Run Pint
        run: ./vendor/bin/pint --test
